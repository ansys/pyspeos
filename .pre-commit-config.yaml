ci:
  # Commit name when auto fixing PRs.
  autofix_commit_msg: |
    ci: auto fixes from pre-commit.com hooks.

    for more information, see https://pre-commit.ci

  autoupdate_commit_msg: 'ci: pre-commit autoupdate'
  autoupdate_schedule: weekly

exclude: |
    (?x)(
        ^tests/assets/
    )

repos:

- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: 2700fd5671c633760d912769c041bfcde2b9a01b  # frozen: v0.15.22
  hooks:
    - id: ruff
    - id: ruff-format

- repo: https://github.com/codespell-project/codespell
  rev: 57b21406f092110c18776e39b0bda50d37c945c8  # frozen: v2.4.3
  hooks:
  - id: codespell
    args: ["--ignore-words", "doc/styles/config/vocabularies/ANSYS/accept.txt", "-w"]

- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
  hooks:
  - id: check-merge-conflict
  - id: debug-statements
  - id: check-yaml
  - id: trailing-whitespace

# This validates our github workflow files
- repo: https://github.com/python-jsonschema/check-jsonschema
  rev: 1a4bb160cab6417b3045e1b37b6b72449243e658  # frozen: 0.37.4
  hooks:
    - id: check-github-workflows

- repo: https://github.com/ansys/pre-commit-hooks
  rev: 55c5b6a5439abd847613579c6924da750e8b78b2  # frozen: v0.8.0
  hooks:
    - id: add-license-headers
      files: '(ansys|tests)/.*\.(py)'
      args:
      - --start_year=2021