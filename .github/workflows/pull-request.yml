name: Pull Request

on:
  pull_request:
    # Add non default types edited and labeled
    types: [opened, reopened, synchronize, edited, labeled]

env:
  MAIN_PYTHON_VERSION: '3.14'
  DOCUMENTATION_CNAME: 'speos.docs.pyansys.com'
  PACKAGE_NAMESPACE: 'ansys.speos.core'
  PACKAGE_NAME: 'ansys-speos-core'
  BUILD_CHEATSHEET: 'true'
  ON_CI: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Disable all default permissions at workflow level for security (least privilege principle)
# Individual jobs will explicitly request only the permissions they need
permissions: {}

jobs:

  label-syncer:
    name: Syncer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: micnncim/action-label-syncer@3abd5ab72fda571e69fffd97bd4e0033dd5f495c # v1.3.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  labeler:
    name: Set labels
    needs: [label-syncer]
    permissions:
      contents: read        # Required to read repository files and .github/labeler.yml configuration
      pull-requests: write  # Required to add/modify labels on pull requests
    runs-on: ubuntu-latest
    steps:

    # Label based on modified files
    - name: Label based on changed files
      uses: actions/labeler@f27b608878404679385c85cfa523b85ccb86e213 # v6.1.0
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}

    # Label based on branch name
    - uses: actions-ecosystem/action-add-labels@18f1af5e3544586314bbe15c0273249c770b2daf # v1.1.3
      if: |
        startsWith(github.event.pull_request.head.ref, 'doc') ||
        startsWith(github.event.pull_request.head.ref, 'docs')
      with:
        labels: documentation

    - uses: actions-ecosystem/action-add-labels@18f1af5e3544586314bbe15c0273249c770b2daf # v1.1.3
      if: |
        startsWith(github.event.pull_request.head.ref, 'maint') ||
        startsWith(github.event.pull_request.head.ref, 'no-ci') ||
        startsWith(github.event.pull_request.head.ref, 'ci')
      with:
        labels: maintenance

    - uses: actions-ecosystem/action-add-labels@18f1af5e3544586314bbe15c0273249c770b2daf # v1.1.3
      if: startsWith(github.event.pull_request.head.ref, 'feat')
      with:
        labels: enhancement

    - uses: actions-ecosystem/action-add-labels@18f1af5e3544586314bbe15c0273249c770b2daf # v1.1.3
      if: |
        startsWith(github.event.pull_request.head.ref, 'fix') ||
        startsWith(github.event.pull_request.head.ref, 'patch')
      with:
        labels: bug

  commenter:
    name: Commenter
    runs-on: ubuntu-latest
    permissions:
      contents: read        # Required to read PR metadata
      pull-requests: write  # Required to post comments on pull requests
    steps:
    - name: Suggest to add labels
      uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
      # Execute only when no labels have been applied to the pull request
      if: toJSON(github.event.pull_request.labels.*.name) == '{}'
      with:
        issue-number: ${{ github.event.pull_request.number }}
        body: |
          Please add one of the following labels to add this contribution to the Release Notes :point_down:
          - [bug](https://github.com/ansys/pyspeos/pulls?q=label%3Abug+)
          - [documentation](https://github.com/ansys/pyspeos/pulls?q=label%3Adocumentation+)
          - [enhancement](https://github.com/ansys/pyspeos/pulls?q=label%3Aenhancement+)
          - [good first issue](https://github.com/ansys/pyspeos/pulls?q=label%3Agood+first+issue)
          - [maintenance](https://github.com/ansys/pyspeos/pulls?q=label%3Amaintenance+)
          - [release](https://github.com/ansys/pyspeos/pulls?q=label%3Arelease+)

  changelog-fragment:
    name: Create changelog fragment
    needs: [labeler]
    permissions:
      contents: write       # Required to commit changelog fragments to the repository
      pull-requests: write  # Required to update PR with changelog information
    runs-on: ubuntu-latest
    steps:
    - uses: ansys/actions/doc-changelog@d946b24b9a765f4169bcc94afdb27bd1a0533741 # v10.3.2
      with:
        token: ${{ secrets.PYANSYS_CI_BOT_TOKEN }}
        use-conventional-commits: true
        use-default-towncrier-config: true
        bot-user: ${{ secrets.PYANSYS_CI_BOT_USERNAME }}
        bot-email: ${{ secrets.PYANSYS_CI_BOT_EMAIL }}

  pr-name:
    name: Check the name of the PR
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read   # Required to read PR metadata
    steps:
      - name: Check commit name
        uses: ansys/actions/check-pr-title@d946b24b9a765f4169bcc94afdb27bd1a0533741 # v10.3.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  actions-security:
    name: Check actions security
    runs-on: ubuntu-latest
    permissions:
      contents: read   # Required to read workflow files and check for security issues
    steps:
      - uses: ansys/actions/check-actions-security@d946b24b9a765f4169bcc94afdb27bd1a0533741 # v10.3.2
        with:
          generate-summary: true
          token: ${{ secrets.GITHUB_TOKEN }}
          auditing-level: 'high'

  vulnerabilities:
    name: Vulnerabilities
    runs-on: ubuntu-latest
    permissions:
      contents: read   # Required to read repository content for vulnerability scanning
    steps:
      - uses: ansys/actions/check-vulnerabilities@d946b24b9a765f4169bcc94afdb27bd1a0533741 # v10.3.2
        with:
          python-version: ${{ env.MAIN_PYTHON_VERSION }}
          python-package-name: ${{ env.PACKAGE_NAME }}
          token: ${{ secrets.PYANSYS_CI_BOT_TOKEN }}
          dev-mode: ${{ github.ref != 'refs/heads/main' }}
          extra-targets: 'graphics,jupyter'

  type-check:
    name: Type check with Ty
    runs-on: ubuntu-latest
    permissions:
      contents: read   # Required to read repository content for type checking
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.MAIN_PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false
          prune-cache: true

      - name: Install dependencies
        run: |
          uv sync --frozen --only-group quality --no-install-project

      # NOTE: At the moment this will only run on a subset of files like ansys/speos/core/speos.py
      # See the pyproject.toml configuration for more information on excluded files/folders
      - name: Run Ty on selected files
        run: |
          source .venv/bin/activate
          ty check

  doc-style:
    name: Documentation style check
    runs-on: ubuntu-latest
    permissions:
      contents: read   # Required to read documentation files for style checking
    steps:
      - name: PyAnsys documentation style checks
        uses: ansys/actions/doc-style@d946b24b9a765f4169bcc94afdb27bd1a0533741 # v10.3.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  smoke-tests:
    name: Build and Smoke tests
    runs-on: ${{ matrix.os }}
    permissions:
      attestations: write   # Required to create and publish build attestations (SLSA provenance)
      contents: read        # Required to read repository content for building
      id-token: write       # Required for OIDC token generation (for provenance signing)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
    steps:
      - name: Build wheelhouse and perform smoke test
        uses: ansys/actions/build-wheelhouse@d946b24b9a765f4169bcc94afdb27bd1a0533741 # v10.3.2
        with:
          attest-provenance: true
          library-name: ${{ env.PACKAGE_NAME }}
          operating-system: ${{ matrix.os }}
          python-version: ${{ matrix.python-version }}

  doc-build:
    name: Documentation build
    runs-on: ubuntu-latest
    needs: [doc-style]
    permissions:
      contents: read   # Required to read documentation files for building
      packages: read   # Required to pull images from GitHub Container Registry (ghcr.io)
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up headless display
        uses: pyvista/setup-headless-display-action@5bc8de3bc71fcda7a96439571287a554901541a0 # v4.3

      - name: Login to GitHub Packages
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io/ansys
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start container
        shell: bash
        env:
          ANSYSLMD_LICENSE_FILE: 1055@${{ secrets.LICENSE_SERVER }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: |
          docker run --detach --name speos-rpc -p 127.0.0.1:50098:50098 -e SPEOS_LOG_LEVEL=2 -e ANSYSLMD_LICENSE_FILE=${ANSYSLMD_LICENSE_FILE} -v "${GITHUB_WORKSPACE}/tests/assets:/app/assets" --entrypoint /app/SpeosRPC_Server.x ghcr.io/ansys/speos-rpc:dev --transport_insecure --host 0.0.0.0

      - name: Run Ansys documentation building action
        uses: ansys/actions/doc-build@d946b24b9a765f4169bcc94afdb27bd1a0533741 # v10.3.2
        with:
          python-version: ${{ env.MAIN_PYTHON_VERSION }}
          check-links: false
          sphinxopts: -j 1 --keep-going # Try without parallel execution
          checkout: false
          dependencies: "pandoc"
          needs-quarto: true
          optional-dependencies-name: 'graphics'
          group-dependencies-name: 'doc'

      - name: Stop container
        shell: bash
        run: |
          docker kill speos-rpc
          docker rm speos-rpc

  doc-deploy-pr:
    name: Deploy PR documentation
    if: contains(github.event.pull_request.labels.*.name, 'deploy-pr-doc')
    needs: [doc-build]
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to update files on the gh-pages branch
      pull-requests: write # Needed to create deployment comments on PRs
    steps:
      - uses: ansys/actions/doc-deploy-pr@d946b24b9a765f4169bcc94afdb27bd1a0533741 # v10.3.2
        with:
          bot-user: ${{ secrets.PYANSYS_CI_BOT_USERNAME }}
          bot-email: ${{ secrets.PYANSYS_CI_BOT_EMAIL }}
          cname: ${{ env.DOCUMENTATION_CNAME }}
          maximum-pr-doc-deployments: 5
          token: ${{ secrets.GITHUB_TOKEN }}

  testing:
    name: Testing and coverage
    needs: [smoke-tests]
    permissions:
      contents: read   # Required to read repository content for testing
      packages: read   # Required to pull images from GitHub Container Registry (ghcr.io)
    with:
      python-versions: '["3.14"]'
      speos-versions: '["dev"]'
    secrets:
      LICENSE_SERVER: ${{ secrets.LICENSE_SERVER }}
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    uses: ./.github/workflows/reusable-speos-tests.yml

  build-library:
    name: Build library
    runs-on: ubuntu-latest
    needs: [doc-build, testing]
    permissions:
      attestations: write   # Required to create and publish package attestations (SLSA provenance)
      contents: read        # Required to read repository content for packaging
      id-token: write       # Required for OIDC token generation (for provenance signing)
    steps:
      - name: Build library source and wheel artifacts
        uses: ansys/actions/build-library@d946b24b9a765f4169bcc94afdb27bd1a0533741 # v10.3.2
        with:
          attest-provenance: true
          library-name: ${{ env.PACKAGE_NAME }}
          python-version: ${{ env.MAIN_PYTHON_VERSION }}
