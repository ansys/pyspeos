name: Test SPEOS versions with Python versions

on:
  workflow_call:
    inputs:
      python-versions:
        description: 'JSON array of Python versions to test, e.g. ["3.10","3.14"]'
        required: false
        type: string
        default: '["3.10", "3.11", "3.12", "3.13", "3.14"]'
      speos-versions:
        description: 'JSON array of Speos versions to test, e.g. ["261","dev"]'
        required: false
        type: string
        default: '["251", "252", "261", "dev"]'
    secrets:
      LICENSE_SERVER:
        required: true
      CODECOV_TOKEN:
        required: true

# Disable all default permissions at workflow level for security (least privilege principle)
# Individual jobs will explicitly request only the permissions they need
permissions: {}

jobs:
  testing:
    name: Testing and coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read   # Required to read repository content for testing
      packages: read   # Required to pull images from GitHub Container Registry (ghcr.io)
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(inputs.python-versions) }}
        speos-version: ${{ fromJSON(inputs.speos-versions) }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up headless display
        uses: pyvista/setup-headless-display-action@5bc8de3bc71fcda7a96439571287a554901541a0 # v4.3

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false
          prune-cache: true

      - name: Install package with test dependencies
        run: |
          uv sync --frozen --group tests --extra graphics --no-dev

      - name: Login to GitHub Packages
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io/ansys
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start container for Speos ${{ matrix.speos-version }}
        shell: bash
        env:
          ANSYSLMD_LICENSE_FILE: 1055@${{ secrets.LICENSE_SERVER }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
          SPEOS_VERSION: ${{ matrix.speos-version }}
        run: |
          docker run --detach --name speos-rpc -p 127.0.0.1:50098:50098 -e SPEOS_LOG_LEVEL=2 -e ANSYSLMD_LICENSE_FILE=${ANSYSLMD_LICENSE_FILE} -v "${GITHUB_WORKSPACE}/tests/assets:/app/assets" --entrypoint /app/SpeosRPC_Server.x ghcr.io/ansys/speos-rpc:${SPEOS_VERSION} -m 25000000 --transport_insecure --host 0.0.0.0

      - name: Run pytest for Speos ${{ matrix.speos-version }}
        shell: bash
        env:
          SPEOS_VERSION: ${{ matrix.speos-version }}
        run: |
          . .venv/bin/activate
          maximal_absolute=999

          if [[ "$SPEOS_VERSION" == "dev" ]]; then
            echo "run pytest for all available features"
            pytest -s --supported-features=$maximal_absolute
          else
            echo "run pytest for Speos ${SPEOS_VERSION} supported features"
            pytest -s --supported-features=$SPEOS_VERSION
          fi

      - name: Upload Coverage Results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: .cov/html
          name: coverage-html-ubuntu-${{ matrix.python-version }}-${{ matrix.speos-version }}
          retention-days: 7

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          files: .cov/xml
          name: coverage-html-ubuntu-${{ matrix.python-version }}-${{ matrix.speos-version }}

      - name: Stop container
        shell: bash
        run: |
          docker kill speos-rpc
          docker rm speos-rpc

