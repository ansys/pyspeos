name: Nightly

on:
  workflow_dispatch:
  schedule:  # UTC at 0300
    - cron:  '0 3 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Disable all default permissions at workflow level for security (least privilege principle)
# Individual jobs will explicitly request only the permissions they need
permissions: {}

jobs:

  testing:
    name: Testing and coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read   # Required to read repository content for testing
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        speos-version: ["251", "252", "261", "dev"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up headless display
        uses: pyvista/setup-headless-display-action@5bc8de3bc71fcda7a96439571287a554901541a0 # v4.3

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Create Python virtual environment
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -c "import sys; print(sys.executable)"

      - name: Install packages for testing
        run: |
          . .venv/bin/activate
          python -m pip install --upgrade pip
          pip install --upgrade build wheel
          pip install .[tests]

      - name: Login to GitHub Packages
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io/ansys
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start container for Speos ${{ matrix.speos-version }}
        shell: bash
        env:
          ANSYSLMD_LICENSE_FILE: 1055@${{ secrets.LICENSE_SERVER }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
          SPEOS_VERSION: ${{ matrix.speos-version }}
        run: |
          docker run --detach --name speos-rpc -p 127.0.0.1:50098:50098 -e SPEOS_LOG_LEVEL=2 -e ANSYSLMD_LICENSE_FILE=${ANSYSLMD_LICENSE_FILE} -v "${GITHUB_WORKSPACE}/tests/assets:/app/assets" --entrypoint /app/SpeosRPC_Server.x ghcr.io/ansys/speos-rpc:${SPEOS_VERSION} -m 25000000 --transport_insecure --host 0.0.0.0

      - name: Run pytest for Speos ${{ matrix.speos-version }}
        env:
          SPEOS_VERSION: ${{ matrix.speos-version }}
        run: |
          . .venv/bin/activate
          maximal_absolute=999

          if [[ "$SPEOS_VERSION" == "dev" ]]; then
            echo "run pytest for all available features"
            pytest -s --supported-features=$maximal_absolute
          else
            echo "run pytest for Speos ${SPEOS_VERSION} supported features"
            pytest -s --supported-features=$SPEOS_VERSION
          fi

      - name: Upload Coverage Results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          path: .cov/html
          name: coverage-html-ubuntu-${{ matrix.python-version }}-${{ matrix.speos-version }}
          retention-days: 7

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          files: .cov/xml
          name: coverage-html-ubuntu-${{ matrix.python-version }}-${{ matrix.speos-version }}

      - name: Stop container
        run: |
          docker kill speos-rpc
          docker rm speos-rpc
